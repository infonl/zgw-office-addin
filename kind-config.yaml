# Kind cluster configuration for testing Office Add-in Helm chart
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: office-addin-test
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  # HTTP
  - containerPort: 30080
    hostPort: 30080
    protocol: TCP
  # HTTPS
  - containerPort: 30443
    hostPort: 30443
    protocol: TCP
