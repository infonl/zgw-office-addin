common:
  # -- Application environment, where production and local have special meaning. Other values will be used as-is in the
  # add-in manifest and can be used to differentiate between different non-production environments (e.g. Acc, Test)
  appEnv: "production"
  # -- The frontend public URL where the manifest files and static js file are served
  frontendUrl: "http://localhost:3000"
  # -- MS Azure Tenant ID of the Organization
  msalTenantId: ""
  # -- MS Azure Client ID assigned to the Office Add-in application
  msalClientId: ""
  # -- Extra pod labels applied to BOTH the frontend and backend pods. Useful for
  # observability: set e.g. `app` / `service_name` so the pods are attributed to
  # the add-in instead of the Helm release name in Grafana/Loki.
  podLabels: {}

frontend:
  image:
    repository: ghcr.io/infonl/zgw-office-addin-frontend
    tag: 0.11.0@sha256:9a6b3e9023b8cfba152a84dd7477e079490fc7d35562d32e0dc094be81a7f7a2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  # -- If enabled nginx will also listen on port 443. You will need to volume map a key
  # and certificate valid for your frontendUrl
  enableHttps: false
  # -- Maximum content body size (e.g. for attachments)
  maxBodySize: 80M
  # -- Resource limits and requests for the frontend container
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # -- Pod annotations for the frontend deployment
  podAnnotations: {}
  # -- Extra pod labels for the frontend pod (merged over common.podLabels)
  podLabels: {}
  # -- Pod security context for the frontend deployment
  podSecurityContext:
    fsGroup: 10001
  # -- Security context for the frontend container
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  # -- Node selector for the frontend deployment
  nodeSelector: {}
  # -- Affinity rules for the frontend deployment
  affinity: {}
  # -- Tolerations for the frontend deployment
  tolerations: []
  # -- Topology spread constraints for the frontend deployment.
  # app.kubernetes.io/instance will be dynamically set to the Helm release name at deployment time.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: frontend
          app.kubernetes.io/instance: "RELEASE-NAME"
  # -- Image pull secrets for the frontend deployment
  imagePullSecrets: []

backend:
  image:
    repository: ghcr.io/infonl/zgw-office-addin-backend
    tag: 0.11.0@sha256:5b188e853531986e31709ed6cae130a891e0014cb267c43ac338b792c84a29ab
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3003
  # -- Client secret for MSAL authentication towards Azure AD
  msalSecret: ""
  # -- ZGW API configuration for integration with the ZGW APIs provider (OpenZaak)
  zgwApis:
    url: "http://localhost:8020"
    secret: ""
  # -- Resource limits and requests for the backend container
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Pod annotations for the backend deployment
  podAnnotations: {}
  # -- Extra pod labels for the backend pod (merged over common.podLabels)
  podLabels: {}
  # -- Pod security context for the backend deployment
  podSecurityContext:
    fsGroup: 10001
  # -- Security context for the backend container
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  # -- Node selector for the backend deployment
  nodeSelector: {}
  # -- Affinity rules for the backend deployment
  affinity: {}
  # -- Tolerations for the backend deployment
  tolerations: []
  # -- Topology spread constraints for the backend deployment
  # app.kubernetes.io/instance will be dynamically set to the Helm release name at deployment time.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: backend
          app.kubernetes.io/instance: "RELEASE-NAME"
  # -- Image pull secrets for the backend deployment
  imagePullSecrets: []
