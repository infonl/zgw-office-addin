# Local development setup
# Requires .env file with MSAL configuration - see .env.example

services:
  zgw-office-addin-frontend:
    image: ghcr.io/infonl/zgw-office-addin-frontend:dev
    ports:
      - "3000:8443"
    environment:
      - APP_ENV=local
      - FRONTEND_URL=https://localhost:3000
      - BACKEND_URL=http://zgw-office-addin-backend:3003
      - MAX_BODY_SIZE=20M
      - ENABLE_HTTPS=true
      - MSAL_CLIENT_ID=${MSAL_CLIENT_ID}
      - MSAL_AUTHORITY=${MSAL_AUTHORITY}
      - MSAL_REDIRECT_URI=https://localhost:3000
      - MSAL_SCOPES=${MSAL_SCOPES}
    volumes:
      - ./office-add-in/ssl-certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:8443/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      zgw-office-addin-backend:
        condition: service_healthy

  zgw-office-addin-backend:
    image: ghcr.io/infonl/zgw-office-addin-backend:dev
    environment:
      - APP_ENV=local
      - JWT_SECRET=${JWT_SECRET:-openZaakSecretKey}
      - API_BASE_URL=http://openzaak.local:8000
      - FRONTEND_URL=https://localhost:3000
      - MSAL_CLIENT_ID=${MSAL_CLIENT_ID}
      - MSAL_AUTHORITY=${MSAL_AUTHORITY}
      - MSAL_SECRET=${MSAL_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -O- -q http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      openzaak-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    volumes:
      - ./scripts/docker-compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./office-add-in/ssl-certs:/etc/prometheus/certs:ro
    ports:
      - "9090:9090"

  openzaak-database:
    image: docker.io/postgis/postgis:17-3.4@sha256:d0b5a6ecab18997637f55a83cb4a9467391de5645916cfa1b6f2a8d19eee7be5
    platform: linux/amd64
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      - POSTGRES_USER=openzaak
      - POSTGRES_PASSWORD=openzaak
      - POSTGRES_DB=openzaak
    volumes:
      - ./scripts/docker-compose/open-zaak/openzaak-database:/docker-entrypoint-initdb.d
      - ./scripts/docker-compose/open-zaak/openzaak-database-data:/var/lib/postgresql/data

  openzaak.local:
    image: docker.io/openzaak/open-zaak:1.28.3@sha256:64c7bb1a03b669236ff269f3ec199c8158a7ca167c1138369e3f598a3a597d09
    platform: linux/amd64
    environment:
      - ALLOWED_HOSTS="*"
      - DB_HOST=openzaak-database
      - DB_NAME=openzaak
      - DB_PASSWORD=openzaak
      - DB_USER=openzaak
      - CACHE_DEFAULT=redis:6379/0
      - CACHE_AXES=redis:6379/0
      - DEBUG=true
      - DISABLE_2FA=true
      - DJANGO_SETTINGS_MODULE=openzaak.conf.docker
      - DJANGO_SUPERUSER_PASSWORD=admin
      - LOG_LEVEL=DEBUG
      # uncomment to enable logging of outgoing requests; can be helpful for debugging
      #- LOG_REQUESTS=true
      - NOTIFICATIONS_DISABLED=${OPENZAAK_NOTIFICATIONS_DISABLED:-true}
      - OPENZAAK_SUPERUSER_USERNAME=admin
      - OPENZAAK_SUPERUSER_EMAIL=noreply@example.com
      - SECRET_KEY=openZaakSecretKey
      - SENDFILE_BACKEND=django_sendfile.backends.simple
      - OTEL_SDK_DISABLED=true
    ports:
      - "8020:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; exit(requests.head('http://localhost:8000/admin/').status_code not in [200, 302])",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      # This should allow for enough time for migrations to run before the max
      # retries have passed. This healthcheck in turn allows other containers
      # to wait for the database migrations.
      start_period: 30s
    depends_on:
      openzaak-database:
        condition: service_healthy
      openzaak-redis:
        condition: service_started

  openzaak-init:
    image: docker.io/openzaak/open-zaak:1.28.3@sha256:64c7bb1a03b669236ff269f3ec199c8158a7ca167c1138369e3f598a3a597d09
    platform: linux/amd64
    environment:
      - DB_HOST=openzaak-database
      - DB_NAME=openzaak
      - DB_PASSWORD=openzaak
      - DB_USER=openzaak
      - DJANGO_SETTINGS_MODULE=openzaak.conf.docker
      - SECRET_KEY=openZaakSecretKey
      - CACHE_DEFAULT=redis:6379/0
      - CACHE_AXES=redis:6379/0
    volumes:
      - ./scripts/docker-compose/open-zaak/init:/init:ro
    command: ["sh", "/init/seed.sh"]
    depends_on:
      openzaak-database:
        condition: service_healthy
      openzaak.local:
        condition: service_healthy

  openzaak-redis:
    image: redis:8.8.0@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b
